function loadFromRecent(idx) {
  document.querySelectorAll('.bsc-modal').forEach(el => el.remove());
  try {
    const recent = JSON.parse(localStorage.getItem('bsc_recent') || '[]');
    applyState(recent[idx].state);
  } catch(e) { alert('Could not load event: ' + e.message); }
}

function loadFromFile(event) {
  document.querySelectorAll('.bsc-modal').forEach(el => el.remove());
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const state = JSON.parse(e.target.result);
      applyState(state);
    } catch(err) { alert('Invalid file: ' + err.message); }
  };
  reader.readAsText(file);
}

function applyState(state) {
  if (!state || !state.cameras) { alert('Invalid event file'); return; }
  cameras   = state.cameras   || [];
  multicams = state.multicams || [];
  Object.assign(G,  state.G  || {});
  Object.assign(MG, state.MG || {});
  selectedSSD = state.selectedSSD ? SSDS.find(s => s.id === state.selectedSSD) || null : null;

  // Restore camId / mcId counters
  camId   = cameras.reduce((m, c) => Math.max(m, c.id), 0);
  mcId    = multicams.reduce((m, c) => Math.max(m, c.id), 0);
  mcOutId = multicams.reduce((m, mc) =>
    mc.outputs.reduce((mo, o) => Math.max(mo, o.id), m), 0);

  if (state.eventName) currentEventName = state.eventName;

  document.getElementById('cameras-container').innerHTML  = '';
  document.getElementById('multicam-container').innerHTML = '';

  renderCameras();
  renderMulticams();
  calc();
  calcMC();
  updateGrandTotal();
  setTab('eng');
  showToast('📂 Event loaded' + (state.eventName ? ': ' + state.eventName : ''));
}

// ── PDF / PRINT EXPORT ──────────────────────────────────────
function exportPDF() {
  // ── Gather all data ──────────────────────────────────────
  const eventName = (typeof currentEventName !== 'undefined' && currentEventName) ? currentEventName : 'Broadcast Storage Report';
  const date      = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  const fmtGB = gb => gb >= 1000 ? `${(gb/1000).toFixed(2)} TB` : `${gb.toFixed(1)} GB`;
  const fmtMins = m => {
    if (!m || m <= 0) return '—';
    if (m < 1)  return `${Math.round(m*60)}s`;
    if (m < 60) return `${Math.round(m)}m`;
    const h = Math.floor(m/60), mn = Math.round(m%60);
    return mn ? `${h}h ${mn}m` : `${h}h`;
  };

  // Get banner data URI from the nav bar background-image
  const navEl   = document.querySelector('.nav-bar');
  const navStyle = navEl ? navEl.getAttribute('style') : '';
  const bannerMatch = navStyle.match(/url\('([^']+)'\)/);
  const bannerURI = bannerMatch ? bannerMatch[1] : '';

  // ── ENG cameras ──────────────────────────────────────────
  const engSections = cameras.map(cam => {
    const isGeneric = cam.brandKey === 'generic';
    if (!cam.brandKey || !cam.modelKey || !cam.rasterId || !cam.fps) return '';
    if (!isGeneric && !cam.codecId) return '';

    const brand     = CAMERA_DB[cam.brandKey];
    const model     = brand.models[cam.modelKey];
    const codecs    = resolveCodecs(cam.brandKey, cam.modelKey);
    const codec     = codecs.find(c => c.id === cam.codecId);
    const mbps      = getCodecMbps(cam);
    const numCams   = cam.numCameras || 1;
    const rawGBhr   = mbps * numCams * 3600 / 8 / 1024;
    const rawGBday  = rawGBhr * cam.hours;
    const rawGBtot  = rawGBday * cam.days;
    const redundGB  = rawGBtot * cam.redund * cam.overhead;

    // Use per-camera params if they exist, else global
    const days    = cam.days    || G.days;
    const hours   = cam.hours   || G.hours;
    const redund  = cam.redund  || G.redund;
    const ovhd    = cam.overhead|| G.overhead;

    const rawGBhrG  = mbps * numCams * 3600 / 8 / 1024;
    const rawGBtotG = rawGBhrG * hours * days;
    const redundGBG = rawGBtotG * redund * ovhd;

    // Card info
    const cardGB      = cam.cardGB || 0;
    const minsPerCard = cardGB > 0 && mbps > 0 ? (cardGB / (mbps / 8 / 1024 * 60)) : 0;
    const cardsNeeded = cardGB > 0 && rawGBtotG > 0 ? Math.ceil(rawGBtotG / cardGB) : 0;
    const cardLabel   = cardGB >= 1000 ? `${cardGB/1000}TB` : cardGB > 0 ? `${cardGB}GB` : '—';

    // Offload
    let offloadPerCard = '', offloadTotal = '', driveCount = '';
    if (selectedSSD && cardGB > 0) {
      const effectiveMBs = Math.min(model.cardReadMB || 500, selectedSSD.readMB * 0.95);
      offloadPerCard = fmtMins((cardGB * 1024) / effectiveMBs / 60);
      offloadTotal   = fmtMins((rawGBtotG * 1024) / effectiveMBs / 60);
      const drivesPerCopy = Math.ceil(rawGBtotG / selectedSSD.capGB);
      driveCount = `${drivesPerCopy * redund} × ${selectedSSD.capGB >= 1000 ? selectedSSD.capGB/1000+'TB' : selectedSSD.capGB+'GB'} ${selectedSSD.name}`;
    }

    const codecLabel  = isGeneric ? `${cam.customMbps||100} Mbps${cam.bitDepth?' · '+cam.bitDepth:''}${cam.colourSpace?' · '+cam.colourSpace:''}` : (codec?.label||'—');
    const gammaLabel  = cam.gamma || '—';

    return `
      <div class="section-card">
        <div class="section-title eng-title">${numCams > 1 ? `${numCams} × ` : ''}${brand.brand} ${model.name}</div>
        <table class="data-table">
          <tr><td class="label">Codec</td><td class="value">${codecLabel}</td>
              <td class="label">Gamma</td><td class="value">${gammaLabel}</td></tr>
          <tr><td class="label">Raster</td><td class="value">${cam.rasterId||'—'}</td>
              <td class="label">Frame rate</td><td class="value">${cam.fps} fps</td></tr>
          <tr><td class="label">Card size</td><td class="value">${cardLabel}</td>
              <td class="label">Days / Hours</td><td class="value">${days}d × ${hours}h</td></tr>
          <tr><td class="label">Redundancy</td><td class="value">×${redund} copies</td>
              <td class="label">Overhead</td><td class="value">+${((ovhd-1)*100).toFixed(0)}%</td></tr>
        </table>
        <div class="result-row">
          <div class="result-label">Storage required</div>
          <div class="result-value hero-green">${fmtGB(redundGBG)}</div>
        </div>
        <div class="result-sub">Raw: ${fmtGB(rawGBtotG)}</div>
        ${cardGB > 0 ? `
        <table class="data-table" style="margin-top:10px">
          <tr><td class="label">Cards needed</td><td class="value">${cardsNeeded} × ${cardLabel}</td>
              <td class="label">Record time / card</td><td class="value">${fmtMins(minsPerCard)}</td></tr>
          ${selectedSSD ? `<tr><td class="label">Offload / card</td><td class="value">${offloadPerCard}</td>
              <td class="label">Total offload</td><td class="value">${offloadTotal}</td></tr>
          <tr><td class="label">Drives</td><td class="value" colspan="3">${driveCount}</td></tr>` : ''}
        </table>` : ''}
      </div>`;
  }).filter(Boolean).join('');

  // ── Multicam sections ────────────────────────────────────
  const mcSections = multicams.map((mc, i) => {
    if (!mc.signalType || !mc.variantId || !mc.bitDepth || !mc.rasterId) return '';
    const readyOutputs = mc.outputs.filter(o => o.containerId && o.codecId && o.rasterId);
    if (!readyOutputs.length) return '';

    const variant = MC_SIGNALS[mc.signalType]?.variants?.find(v => v.id === mc.variantId);
    const bitDepthLabel = MC_BIT_DEPTHS.find(b => b.id === mc.bitDepth)?.label || mc.bitDepth;

    let feedTotal = 0;
    const outputRows = readyOutputs.map((out, oi) => {
      const codec    = MC_CODECS.find(c => c.id === out.codecId);
      const container= MC_CONTAINERS.find(c => c.id === out.containerId);
      const channels = out.channels || 1;
      const mbps     = codec ? (codec.vbr ? ((out.vbrKbps||codec.baseMbps*1000)/1000) : codec.baseMbps) : 0;
      const rawGB    = mbps * channels * 3600 / 8 / 1024 * MG.hours * MG.days;
      const redGB    = rawGB * MG.redund * MG.overhead;
      feedTotal     += redGB;
      return `<tr>
        <td class="label">Output ${oi+1}</td>
        <td class="value">${container?.label||''} · ${codec?.label||''} · ${out.rasterId} · ${channels} ISO${channels!==1?'s':''}</td>
        <td class="value right hero-green">${fmtGB(redGB)}</td>
      </tr>`;
    }).join('');

    return `
      <div class="section-card">
        <div class="section-title mc-title">Multicam Feed ${i+1} — ${variant?.label||mc.signalType}</div>
        <table class="data-table">
          <tr><td class="label">Bit depth</td><td class="value">${bitDepthLabel}</td>
              <td class="label">Incoming raster</td><td class="value">${mc.rasterId}</td></tr>
          <tr><td class="label">Days / Hours</td><td class="value">${MG.days}d × ${MG.hours}h</td>
              <td class="label">Redundancy</td><td class="value">×${MG.redund} copies</td></tr>
        </table>
        <table class="data-table output-table" style="margin-top:10px">
          <thead><tr>
            <th>Output</th><th>Configuration</th><th class="right">Storage</th>
          </tr></thead>
          <tbody>${outputRows}</tbody>
        </table>
        <div class="result-row">
          <div class="result-label">Feed total</div>
          <div class="result-value hero-green">${fmtGB(feedTotal)}</div>
        </div>
      </div>`;
  }).filter(Boolean).join('');

  // ── Grand totals ─────────────────────────────────────────
  let engTotal = 0, mcTotal = 0;
  cameras.forEach(cam => {
    const isG = cam.brandKey === 'generic';
    if (!cam.brandKey || !cam.modelKey || !cam.rasterId || !cam.fps) return;
    if (!isG && !cam.codecId) return;
    const mb = getCodecMbps(cam);
    engTotal += mb * (cam.numCameras||1) * 3600/8/1024 * (cam.hours||G.hours) * (cam.days||G.days) * (cam.redund||G.redund) * (cam.overhead||G.overhead);
  });
  multicams.forEach(mc => {
    if (!mc.signalType || !mc.variantId || !mc.bitDepth || !mc.rasterId) return;
    mc.outputs.filter(o=>o.containerId&&o.codecId&&o.rasterId).forEach(out => {
      const codec = MC_CODECS.find(c=>c.id===out.codecId);
      const ch = out.channels||1;
      const mb = codec ? (codec.vbr?((out.vbrKbps||codec.baseMbps*1000)/1000):codec.baseMbps) : 0;
      mcTotal += mb * ch * 3600/8/1024 * MG.hours * MG.days * MG.redund * MG.overhead;
    });
  });
  const grandTotal = engTotal + mcTotal;

  // ── Build print window ───────────────────────────────────
  const bannerStyle = bannerURI
    ? `background-image:url('${bannerURI}');background-size:cover;background-position:center 42%;`
    : 'background:#1a1a1a;';

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${eventName}</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; background:#fff; color:#1c1c1e; font-size:11pt; }

  .page-header {
    ${bannerStyle}
    height:70px;
    position:relative;
    margin-bottom:20px;
    page-break-inside:avoid;
  }
  .page-header-overlay {
    position:absolute;inset:0;
    background:linear-gradient(to right,rgba(0,0,0,0.6) 0%,rgba(0,0,0,0.2) 100%);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;
  }
  .header-title { font-size:18pt;font-weight:700;color:#fff;letter-spacing:-0.3px; }
  .header-sub   { font-size:9pt;color:rgba(255,255,255,0.75);margin-top:2px; }
  .header-right { text-align:right;color:rgba(255,255,255,0.75);font-size:9pt; }

  .grand-total-box {
    background:#f2f2f7;border-radius:10px;padding:16px 20px;
    margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;
  }
  .grand-total-label { font-size:11pt;color:#555;font-weight:500; }
  .grand-total-value { font-size:28pt;font-weight:700;color:#1a6b3a;letter-spacing:-1px; }
  .grand-total-unit  { font-size:14pt;font-weight:400;color:#888;margin-left:4px; }
  .grand-total-sub   { font-size:9pt;color:#888;margin-top:4px; }

  .section-card {
    border:1px solid #e0e0e0;border-radius:8px;padding:14px 16px;
    margin-bottom:14px;page-break-inside:avoid;
  }
  .section-title { font-size:12pt;font-weight:700;margin-bottom:10px; }
  .eng-title { color:#0a5ea8; }
  .mc-title  { color:#7a3db0; }

  .data-table { width:100%;border-collapse:collapse; }
  .data-table td, .data-table th { padding:4px 8px;font-size:9.5pt;vertical-align:top; }
  .data-table thead tr { border-bottom:1px solid #ddd; }
  .data-table th { font-weight:600;color:#555;text-align:left;font-size:9pt; }
  .data-table .label { color:#888;width:22%;font-size:9pt; }
  .data-table .value { color:#1c1c1e;width:28%; }
  .data-table .right { text-align:right; }
  .output-table td, .output-table th { border-bottom:0.5px solid #eee; }

  .result-row { display:flex;align-items:baseline;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #e0e0e0; }
  .result-label { font-size:10pt;color:#555;font-weight:500; }
  .result-value { font-size:18pt;font-weight:700;letter-spacing:-0.5px; }
  .result-sub   { font-size:9pt;color:#888;text-align:right;margin-top:2px; }
  .hero-green   { color:#1a6b3a; }

  .section-header {
    font-size:10pt;font-weight:600;color:#888;text-transform:uppercase;
    letter-spacing:0.08em;margin:20px 0 10px;border-bottom:1px solid #e0e0e0;padding-bottom:6px;
  }

  @page { margin:15mm; }
  @media print {
    .page-header { -webkit-print-color-adjust:exact;print-color-adjust:exact; }
    .grand-total-box { -webkit-print-color-adjust:exact;print-color-adjust:exact; }
    .section-card { page-break-inside:avoid; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-overlay">
    <div>
      <div class="header-title">Broadcast Storage Calculator</div>
      <div class="header-sub">© The Naked Film Co Ltd</div>
    </div>
    <div class="header-right">
      <div style="font-size:11pt;font-weight:600;color:#fff">${eventName}</div>
      <div>${date}</div>
    </div>
  </div>
</div>

<div class="grand-total-box">
  <div>
    <div class="grand-total-label">Total Storage Required</div>
    <div class="grand-total-sub">${engSections ? 'ENG' : ''}${engSections && mcSections ? ' + Multicam' : mcSections ? 'Multicam' : ''} · with redundancy &amp; overhead</div>
  </div>
  <div style="text-align:right">
    <span class="grand-total-value">${grandTotal >= 1024 ? (grandTotal/1000).toFixed(2) : grandTotal.toFixed(1)}</span>
    <span class="grand-total-unit">${grandTotal >= 1024 ? 'TB' : 'GB'}</span>
  </div>
</div>

${engSections ? `<div class="section-header">ENG Cameras</div>${engSections}` : ''}
${mcSections  ? `<div style="page-break-before:always"></div>
<div class="page-header">
  <div class="page-header-overlay">
    <div>
      <div class="header-title">Broadcast Storage Calculator</div>
      <div class="header-sub">© The Naked Film Co Ltd</div>
    </div>
    <div class="header-right">
      <div style="font-size:11pt;font-weight:600;color:#fff">${eventName}</div>
      <div>${date}</div>
    </div>
  </div>
</div>
<div class="section-header">Multicam Record</div>${mcSections}` : ''}

</body>
</html>`;

  // Use hidden iframe instead of window.open — avoids popup blocker
  let iframe = document.getElementById('bsc-print-frame');
  if (iframe) iframe.remove();
  iframe = document.createElement('iframe');
  iframe.id = 'bsc-print-frame';
  iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:210mm;height:297mm;border:none;visibility:hidden;';
  document.body.appendChild(iframe);

  iframe.onload = () => {
    setTimeout(() => {
      try {
        if (iframe.contentWindow) {
          iframe.contentWindow.focus();
          iframe.contentWindow.print();
        } else {
          // Fallback — write to a blob URL
          const blob = new Blob([html], { type: 'text/html' });
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement('a');
          a.href     = url;
          a.target   = '_blank';
          a.style.display = 'none';
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
        }
      } catch(e) {
        showToast('⚠ Print failed — try opening in Chrome');
      }
    }, 400);
  };

  iframe.srcdoc = html;
}

// ── TOAST NOTIFICATION ──────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = `
    position:fixed;bottom:max(24px,env(safe-area-inset-bottom));
    left:50%;transform:translateX(-50%) translateY(20px);
    background:#1c1c1e;border:0.5px solid rgba(255,255,255,0.15);
    color:#fff;font-family:-apple-system,sans-serif;
    font-size:14px;font-weight:500;
    padding:10px 18px;border-radius:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    z-index:9998;opacity:0;transition:all 0.3s;white-space:nowrap;
  `;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => {
    t.style.opacity = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
  });
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(10px)';
    setTimeout(() => t.remove(), 300);
  }, 2800);
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
setOverhead(1.2,'oh-std','20%');
updateGrandTotal();
calc();
calcMC();
setTimeout(enhanceStepperInputs, 50);

</script>
</body>
</html>
